<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Language Translation Interface</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --border: #e2e8f0; --danger: #ef4444; --success: #10b981; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; }
        
        .input-panel { width: 420px; padding: 25px; background: white; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        .output-panel { flex-grow: 1; padding: 25px; overflow-y: auto; }

        label { font-size: 0.75rem; font-weight: bold; color: #64748b; letter-spacing: 0.05rem; }
        select, textarea, input { padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.9rem; }
        textarea { flex-grow: 1; font-family: "Courier New", monospace; resize: none; line-height: 1.5; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        
        #processBtn { background: var(--primary); grid-column: span 2; font-size: 1rem; }
        #downloadBtn { background: var(--success); display: none; } 
        #clearBtn { background: var(--danger); }

        table { width: 100%; border-collapse: collapse; background: white; border: 1px solid var(--border); margin-top: 10px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        th, td { padding: 14px; border: 1px solid var(--border); vertical-align: top; }
        th { background: #f1f5f9; text-align: left; color: #475569; }
        
        .rtl { direction: rtl; text-align: right; font-family: 'Arial', sans-serif; font-size: 1.1rem; }
        .ltr { direction: ltr; text-align: left; }
        .loading { text-align: center; color: #94a3b8; margin-top: 50px; font-style: italic; }
    </style>
</head>
<body>

<div class="input-panel">
    <h2 style="margin:0 0 10px 0; color:var(--primary);">Translator Interface</h2>
    
    <label>SOURCE LANGUAGE</label>
    <select id="langSelect">
        <option value="Italian">Italian</option>
        <option value="Hebrew">Hebrew</option>
        <option value="Russian">Russian</option>
        <option value="Armenian">Armenian</option>
        <option value="French">French</option>
        <option value="Ukrainian">Ukrainian</option>
        <option value="Greek">Greek</option>
        <option value="Albanian">Albanian</option>
        <option value="Bosnian">Bosnian</option>
        <option value="Croatian">Croatian</option>
        <option value="Serbian">Serbian</option>
        <option value="Arabic">Arabic</option>
        <option value="Bulgarian">Bulgarian</option>
        <option value="German">German</option>
        <option value="Uzbek">Uzbek</option>
        <option value="Tajik">Tajik</option>
    </select>

    <label>GEMINI API KEY</label>
    <input type="password" id="apiKey" placeholder="Enter API Key...">

    <label>TRANSCRIPT CONTENT</label>
    <textarea id="rawInput" placeholder="Paste transcript with timecodes here..."></textarea>
    
    <div class="btn-group">
        <button id="processBtn">Process & Translate (Enter)</button>
        <button id="clearBtn">Clear All</button>
        <button id="downloadBtn">Download Word</button>
    </div>
</div>

<div class="output-panel" id="outputArea">
    <div id="tableContainer">
        <p class="loading">Ready for input. Paste your transcript and press Enter.</p>
    </div>
</div>

<script>
    const btn = document.getElementById('processBtn');
    const dlBtn = document.getElementById('downloadBtn');
    const clearBtn = document.getElementById('clearBtn');
    const container = document.getElementById('tableContainer');

    // 1. Process Logic
    btn.addEventListener('click', async () => {
        const rawContent = document.getElementById('rawInput').value;
        const lang = document.getElementById('langSelect').value;
        const apiKey = document.getElementById('apiKey').value;
        
        if (!rawContent || !apiKey) return alert("Please provide both the transcript and your API key.");

        container.innerHTML = "<p class='loading'>AI is processing your rules and translating... Please wait.</p>";

        // Pre-Process (Rule: Remove Timecodes & 1-9 to Words)
        let cleaned = rawContent.replace(/\[?\d{1,2}:\d{2}(:\d{2})?\]?/g, "");
        const numWords = ["zero", "one", "two", "three", "four", "five", "six", "seven", "eight", "nine"];
        cleaned = cleaned.replace(/\b[1-9]\b/g, (m) => numWords[m]);

        const prompt = `Translate this ${lang}/English mix. Output ONLY an HTML table. 
        Cols: Speaker, ${lang}/English, English Translation. 
        In the English Translation column, you MUST bold every word that was originally English in the middle column.
        Use // for speaker interruptions. Use ... for thought gaps (capitalize the following word).
        Numbers 1-9 must be words, 10+ figures. No timecodes. No summaries.
        Content: ${cleaned}`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            const aiResult = data.candidates[0].content.parts[0].text.replace(/```html|```/g, "");
            
            container.innerHTML = aiResult;
            
            // Apply RTL to second column if Hebrew or Arabic
            const isRTL = ["Hebrew", "Arabic"].includes(lang);
            document.querySelectorAll("td:nth-child(2)").forEach(td => {
                if(isRTL) td.classList.add("rtl");
            });

            dlBtn.style.display = "block";
        } catch (e) {
            container.innerHTML = "<p style='color:red;'>Error: Check your API key or connection. Details: " + e.message + "</p>";
        }
    });

    // 2. Word Download Logic
    dlBtn.addEventListener('click', () => {
        const tableHtml = container.innerHTML;
        const header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Translation Export</title><style>table { border-collapse: collapse; width: 100%; } td, th { border: 1px solid black; padding: 5px; }</style></head><body>";
        const footer = "</body></html>";
        const sourceHTML = header + tableHtml + footer;
        
        const blob = new Blob(['\ufeff', sourceHTML], { type: 'application/msword' });
        saveAs(blob, "translation_export.doc");
    });

    // 3. Clear Function
    clearBtn.addEventListener('click', () => {
        if(confirm("Are you sure you want to clear everything?")) {
            document.getElementById('rawInput').value = "";
            document.getElementById('apiKey').value = "";
            container.innerHTML = "<p class='loading'>Ready for input. Paste your transcript and press Enter.</p>";
            dlBtn.style.display = "none";
        }
    });

    // Enter Key shortcut
    document.getElementById('rawInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { 
            e.preventDefault(); 
            btn.click(); 
        }
    });
</script>

</body>
</html>
