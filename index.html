<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcription & Translation System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --border: #e2e8f0; --danger: #ef4444; --success: #10b981; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .container { display: flex; width: 100%; height: 100%; }
        .input-panel { width: 420px; padding: 25px; background: white; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        .output-panel { flex-grow: 1; padding: 25px; overflow-y: auto; }
        label { font-size: 0.75rem; font-weight: 700; color: #64748b; margin-top: 5px; }
        select, textarea, input { width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.95rem; box-sizing: border-box; }
        textarea { flex-grow: 1; resize: none; font-family: "Courier New", monospace; line-height: 1.6; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        button { padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; transition: transform 0.1s; }
        #processBtn { background: var(--primary); color: white; grid-column: span 2; }
        #clearBtn { background: var(--danger); color: white; }
        #downloadBtn { background: var(--success); color: white; display: none; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; border: 1px solid var(--border); margin-top: 10px; }
        th, td { padding: 15px; border: 1px solid var(--border); vertical-align: top; line-height: 1.5; }
        th { background: #f8fafc; color: #475569; font-weight: 600; text-align: left; }
        .rtl { direction: rtl !important; text-align: right !important; font-family: "Arial", sans-serif; font-size: 1.1rem; }
        .ltr { direction: ltr !important; text-align: left !important; }
        .loading { text-align: center; color: #64748b; padding: 50px; font-style: italic; }
        .error-box { background: #fee2e2; color: #b91c1c; padding: 15px; border-radius: 8px; border: 1px solid #fecaca; margin-top: 10px; font-size: 0.9rem; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="container">
    <div class="input-panel">
        <h2>Control Panel</h2>
        <label>TARGET LANGUAGE</label>
        <select id="langSelect">
            <option value="Italian">Italian</option>
            <option value="Hebrew">Hebrew</option>
            <option value="Russian">Russian</option>
            <option value="Armenian">Armenian</option>
            <option value="French">French</option>
            <option value="Ukrainian">Ukrainian</option>
            <option value="Greek">Greek</option>
            <option value="Albanian">Albanian</option>
            <option value="Bosnian">Bosnian</option>
            <option value="Croatian">Croatian</option>
            <option value="Serbian">Serbian</option>
            <option value="Arabic">Arabic</option>
            <option value="Bulgarian">Bulgarian</option>
            <option value="German">German</option>
            <option value="Uzbek">Uzbek</option>
            <option value="Tajik">Tajik</option>
        </select>
        <label>GEMINI API KEY</label>
        <input type="password" id="apiKey" placeholder="Paste your API key here">
        <label>RAW TRANSCRIPT</label>
        <textarea id="rawInput" placeholder="Paste content here..."></textarea>
        <div class="btn-group">
            <button id="processBtn">Process & Translate (Enter)</button>
            <button id="clearBtn">Clear All</button>
            <button id="downloadBtn">Download Word</button>
        </div>
    </div>
    <div class="output-panel" id="outputArea">
        <h2>Live Table Output</h2>
        <div id="tableContainer">
            <p class="loading">Ready. Paste content and press Enter.</p>
        </div>
    </div>
</div>

<script>
    const btn = document.getElementById('processBtn');
    const dlBtn = document.getElementById('downloadBtn');
    const clearBtn = document.getElementById('clearBtn');
    const container = document.getElementById('tableContainer');

    document.getElementById('rawInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            btn.click();
        }
    });

    clearBtn.addEventListener('click', () => {
        if (confirm("Clear all data?")) {
            document.getElementById('rawInput').value = "";
            document.getElementById('apiKey').value = "";
            container.innerHTML = '<p class="loading">Ready.</p>';
            dlBtn.style.display = 'none';
        }
    });

    // Try multiple model names to bypass regional 404s
    async function tryModels(key, prompt, lang) {
        const models = ['gemini-1.5-flash', 'gemini-1.5-flash-latest', 'gemini-1.5-flash-001', 'gemini-pro'];
        
        for (let model of models) {
            container.innerHTML = `<p class="loading">Attempting connection via ${model}...</p>`;
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                
                const data = await response.json();
                
                if (data.candidates && data.candidates[0]) {
                    return data.candidates[0].content.parts[0].text;
                }
                
                if (data.error && data.error.code !== 404) {
                    throw new Error(data.error.message);
                }
            } catch (e) {
                console.log(`Failed with ${model}: ${e.message}`);
            }
        }
        throw new Error("Could not find a valid model. Please verify your API key in Google AI Studio.");
    }

    btn.addEventListener('click', async () => {
        const rawContent = document.getElementById('rawInput').value;
        const lang = document.getElementById('langSelect').value;
        const key = document.getElementById('apiKey').value;
        
        if (!rawContent || !key) return alert("Please provide text and API key.");

        let cleaned = rawContent.replace(/\[?\d{1,2}:\d{2}(:\d{2})?\]?/g, "");
        const numWords = ["zero", "one", "two", "three", "four", "five", "six", "seven", "eight", "nine"];
        cleaned = cleaned.replace(/\b[1-9]\b/g, (m) => numWords[m]);

        const promptText = `Translate this ${lang}/English mix. Output ONLY a valid HTML table. 
        Cols: Speaker, ${lang}/English Mix (Original), English Translation. 
        In Col 3, bold any word that was originally English. 1-9 as words. Use // for interruptions. Use ... for gaps. No summaries.
        Content: ${cleaned}`;

        try {
            const aiResult = await tryModels(key, promptText, lang);
            container.innerHTML = aiResult.replace(/```html|```/g, "").trim();

            const isRTL = ["Hebrew", "Arabic"].includes(lang);
            document.querySelectorAll("#tableContainer td:nth-child(2)").forEach(td => {
                td.className = isRTL ? "rtl" : "ltr";
            });

            dlBtn.style.display = "block";
        } catch (error) {
            container.innerHTML = `<div class="error-box"><strong>Error:</strong> ${error.message}</div>`;
        }
    });

    dlBtn.addEventListener('click', () => {
        const tableHtml = container.innerHTML;
        const header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Translation</title><style>table { border: 1px solid black; border-collapse: collapse; width: 100%; } td, th { border: 1px solid black; padding: 8px; }</style></head><body>";
        const footer = "</body></html>";
        const blob = new Blob(['\ufeff', header + tableHtml + footer], { type: 'application/msword' });
        saveAs(blob, "translation.doc");
    });
</script>

</body>
</html>
